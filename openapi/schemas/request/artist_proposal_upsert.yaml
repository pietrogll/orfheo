---
type: object
required:
- call_id
- event_id
- subcategory
- form_id
- title
- phone
- short_description
additionalProperties: true
properties:
  id:
    "$ref": "#/components/schemas/uuid"
  profile_id:
    "$ref": "#/components/schemas/uuid"
  event_id:
    "$ref": "#/components/schemas/uuid"
  call_id:
    "$ref": "#/components/schemas/uuid"
  production_id:
    "$ref": "#/components/schemas/uuid"
  form_id:
    "$ref": "#/components/schemas/uuid"
  own:
    oneOf:
    - type: boolean
    - type: string
    nullable: true
  name:
    type: string
  email:
    type: string
    format: email
  subcategory:
    type: string
  other_categories: {}
  other: {}
  category:
    type: string
  format:
    type: string
  title:
    type: string
  short_description:
    type: string
  description:
    type: string
  duration:
    type: string
  photos:
    type: array
    items:
      type: string
    nullable: true
  links:
    type: array
    items:
      "$ref": "#/components/schemas/link_item"
    nullable: true
  children: {}
  cache:
    "$ref": "#/components/schemas/cache_field"
  phone:
    type: object
    required:
    - value
    additionalProperties: true
    properties:
      value:
        type: string
      visible:
        type: boolean
