---
type: object
required:
- profile_id
- name
- address
- description
- type
- ambients
additionalProperties: true
properties:
  profile_id:
    "$ref": "#/components/schemas/Uuid"
  id:
    "$ref": "#/components/schemas/Uuid"
  name:
    type: string
  space_name:
    description: Alternative to `name` accepted by server.
    type: string
  type:
    type: string
  address: {}
  description: {}
  size: {}
  plane_picture:
    type: array
    items:
      type: string
    nullable: true
  main_picture:
    type: array
    items:
      type: string
    nullable: true
  human_resources: {}
  materials: {}
  accessibility: {}
  rules: {}
  single_ambient: {}
  ambients:
    description: Accepts array or hash-of-ambient; server normalizes hash values to
      array.
    oneOf:
    - type: array
      items:
        "$ref": "#/components/schemas/AmbientUpsert"
    - type: object
      additionalProperties:
        "$ref": "#/components/schemas/AmbientUpsert"
