---
type: object
required:
- profile_id
- format
- category
- title
- description
- short_description
additionalProperties: true
properties:
  profile_id:
    "$ref": "#/components/schemas/uuid"
  id:
    "$ref": "#/components/schemas/uuid"
  format:
    type: string
  category:
    type: string
  title:
    type: string
  tags:
    description: Incoming tags as strings (server will map/create Tag ids and return
      tag texts).
    type: array
    items:
      type: string
    nullable: true
  description:
    type: string
  short_description:
    type: string
  duration:
    type: string
    nullable: true
  photos:
    type: array
    items:
      type: string
    nullable: true
  main_picture:
    oneOf:
    - type: array
      items:
        type: string
    - type: string
    nullable: true
  links:
    type: array
    items:
      "$ref": "#/components/schemas/link_item"
    nullable: true
  children: {}
  cache:
    "$ref": "#/components/schemas/cache_field"
