servers:
- url: http://localhost:3000
  description: Local
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rack.session
  schemas:
    ambient_public:
      allOf:
      - "$ref": "#/components/schemas/AmbientUpsert"
      - type: object
        description: Stored ambient has more fields; responses strip space_id/user_id/profile_id.
    business_message:
      allOf:
      - "$ref": "#/components/schemas/ContactMessage"
      - type: object
        required:
        - subject
        properties:
          subject:
            type: string
    cache_field:
      description: Common cache object used by some elements.
      oneOf:
      - type: object
        required:
        - value
        - visible
        additionalProperties: true
        properties:
          value: {}
          visible:
            type: boolean
          comment: {}
      - {}
    contact_message:
      type: object
      required:
      - email
      - name
      - message
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        message:
          type: string
    fail_envelope:
      type: object
      required:
      - status
      - reason
      properties:
        status:
          type: string
          enum:
          - fail
        reason:
          type: string
        backtrace:
          type: array
          items:
            type: string
      additionalProperties: true
    form:
      type: object
      required:
      - id
      - call_id
      - type
      - blocks
      - texts
      additionalProperties: true
      properties:
        id:
          "$ref": "#/components/schemas/Uuid"
        call_id:
          "$ref": "#/components/schemas/Uuid"
        user_id:
          "$ref": "#/components/schemas/Uuid"
        type:
          type: string
          enum:
          - artist
          - space
        texts:
          type: object
