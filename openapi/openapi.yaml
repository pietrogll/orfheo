  "/login":
    post:
      summary: Log in
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: Success or failure
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/login_success"
                - "$ref": "#/components/schemas/fail_envelope"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/login_request"
    get:
      summary: Get current session info
      tags:
      - Auth
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  required:
                  - status
                  - logged_in
                  - user_id
                  - user
                  properties:
                    status:
                      type: string
                      enum:
                      - success
                    logged_in:
                      type: boolean
                      enum:
                      - true
                    user_id:
                      type: string
                    user:
                      type: object
                - type: object
                  required:
                  - status
                  - logged_in
                  properties:
                    status:
                      type: string
                      enum:
                      - success
                    logged_in:
                      type: boolean
                      enum:
                      - false
  "/login/login":
    post:
      summary: Log in (legacy route)
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: Success or failure
          content:
            application/json:
              examples:
                success:
                  value:
                    status: success
                    lang: en
                  summary: Successful login
                failure_non_existing_user:
                  value:
                    status: fail
                    reason: non_existing_user
                  summary: Login failure when the user does not exist
              schema:
                oneOf:
                - "$ref": "#/components/schemas/login_success"
                - "$ref": "#/components/schemas/fail_envelope"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/login_request"
  "/logout":
    post:
