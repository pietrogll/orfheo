components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rack.session

  parameters:
    MetaId:
      in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    MetaValue:
      in: path
      name: value
      required: true
      schema: {type: string}

  responses:
    SuccessEmptyOrFail:
      description: Success (empty) or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - $ref: '#/components/schemas/FailEnvelope'

    SuccessEnvelopeOrFail:
      description: Success envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/SuccessEnvelope'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithEventOrFail:
      description: Event envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/EventResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithCallOrFail:
      description: Call envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/CallResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithProgramOrFail:
      description: Program envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ProgramResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithFormOrFail:
      description: Form envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/FormResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithProductionOrFail:
      description: Production envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ProductionResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithSpaceOrFail:
      description: Space envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/SpaceResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithFreeBlockOrFail:
      description: Free block envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/FreeBlockResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithSavedOrFail:
      description: Meta save envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/MetaSavedResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    EnvelopeWithListOrFail:
      description: Meta list envelope or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/MetaListResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    WebsocketEventModelOrFail:
      description: Websocket-trigger message or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/WebsocketEventModelResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    WebsocketWhitelistAddedOrFail:
      description: Websocket-trigger message (addWhitelist) or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/WebsocketAddWhitelistResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    WebsocketWhitelistDeletedOrFail:
      description: Websocket-trigger message (addWhitelist with updated list) or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/WebsocketDeleteWhitelistResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    WebsocketParticipantModifiedOrFail:
      description: Websocket-trigger message (modifyParticipant) or fail
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/WebsocketModifyParticipantResponse'
              - $ref: '#/components/schemas/FailEnvelope'

    NotFound:
      description: Not Found
      content:
        text/plain:
          schema:
            type: string

  schemas:
    Uuid:
      type: string
      format: uuid

    Lang:
      type: string
      enum: [en, es, ca]

    SuccessEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success]
      additionalProperties: true

    FailEnvelope:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [fail]
        reason:
          type: string
        backtrace:
          type: array
          items:
            type: string
      additionalProperties: true

    ContactMessage:
      type: object
      required: [email, name, message]
      properties:
        email: {type: string, format: email}
        name: {type: string}
        message: {type: string}

    BusinessMessage:
      allOf:
        - $ref: '#/components/schemas/ContactMessage'
        - type: object
          required: [subject]
          properties:
            subject: {type: string}

    RegisterRequest:
      type: object
      required: [email, password, lang]
      properties:
        email: {type: string, format: email}
        password: {type: string, minLength: 8}
        lang: {$ref: '#/components/schemas/Lang'}
        event_id: {$ref: '#/components/schemas/Uuid'}

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string}

    LoginSuccess:
      type: object
      required: [status, lang]
      properties:
        status:
          type: string
          enum: [success]
        lang:
          $ref: '#/components/schemas/Lang'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: {type: string, format: email}

    ModifyPasswordRequest:
      type: object
      required: [password]
      properties:
        password: {type: string, minLength: 8}

    ModifyLangRequest:
      type: object
      required: [lang]
      properties:
        lang: {$ref: '#/components/schemas/Lang'}

    SaveInterestsRequest:
      type: object
      required: [interests]
      properties:
        interests:
          type: object
          additionalProperties: true

    UserHeaderResponse:
      type: object
      required: [status, profiles, events, admin, interests]
      properties:
        status: {type: string, enum: [success]}
        profiles:
          type: array
          items: {type: object, additionalProperties: true}
        events:
          type: array
          items: {type: object, additionalProperties: true}
        admin: {type: boolean}
        interests: {type: object, additionalProperties: true}

    GetUserEmailResponse:
      type: object
      required: [status, user_email]
      properties:
        status: {type: string, enum: [success]}
        user_email: {type: string}

    CheckNameRequest:
      type: object
      required: [name]
      properties:
        name: {type: string}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    AvailabilityResponse:
      type: object
      required: [status, available]
      properties:
        status: {type: string, enum: [success]}
        available: {type: boolean}

    AvailableResponse:
      $ref: '#/components/schemas/AvailabilityResponse'

    IdOnlyRequest:
      type: object
      required: [id]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}

    IdResponse:
      type: object
      required: [status, id]
      properties:
        status: {type: string, enum: [success]}
        id: {$ref: '#/components/schemas/Uuid'}

    ProfileUpsert:
      type: object
      description: |-
        Profile payload. Required fields are enforced server-side.
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        address: {type: object, additionalProperties: true}
        color: {type: string}
        email: {type: object, additionalProperties: true}
        facets:
          type: array
          items: {type: string}

    ModifyProfileDescriptionRequest:
      type: object
      required: [id]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
      additionalProperties: true

    ModifyProfileNameRequest:
      type: object
      required: [id, name]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}

    ProfileResponse:
      type: object
      required: [status, profile]
      properties:
        status: {type: string, enum: [success]}
        profile: {type: object, additionalProperties: true}

    ListProfilesResponse:
      type: object
      required: [status, profiles]
      properties:
        status: {type: string, enum: [success]}
        profiles:
          type: array
          items: {type: object, additionalProperties: true}

    ProfileProductionsSpacesRequest:
      type: object
      required: [profile_id]
      properties:
        profile_id: {$ref: '#/components/schemas/Uuid'}
        event_id: {$ref: '#/components/schemas/Uuid'}

    ProfileProductionsSpacesResponse:
      type: object
      required: [status, productions, spaces, submitted_spaces]
      properties:
        status: {type: string, enum: [success]}
        productions:
          type: array
          items: {type: object, additionalProperties: true}
        spaces:
          type: array
          items: {type: object, additionalProperties: true}
        submitted_spaces:
          type: array
          items: {type: object, additionalProperties: true}

    EventUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        texts: {type: object, additionalProperties: true}
        type: {type: string}
        place: {type: string}
        categories:
          type: array
          items: {type: string}
        eventTime:
          type: array
          items: {type: object, additionalProperties: true}
        slug: {type: string}

    ListEventsResponse:
      type: object
      required: [status, events]
      properties:
        status: {type: string, enum: [success]}
        events:
          type: array
          items: {type: object, additionalProperties: true}

    EventResponse:
      type: object
      required: [status, event]
      properties:
        status: {type: string, enum: [success]}
        event: {type: object, additionalProperties: true}

    EventManagerRequest:
      type: object
      required: [event_id]
      properties:
        event_id: {$ref: '#/components/schemas/Uuid'}
        lang: {$ref: '#/components/schemas/Lang'}

    EventManagerResponse:
      type: object
      required: [status, the_event, forms]
      properties:
        status: {type: string, enum: [success]}
        the_event: {type: object, additionalProperties: true}
        forms: {type: object, additionalProperties: true}

    CheckSlugRequest:
      type: object
      required: [slug]
      properties:
        slug: {type: string}

    CreateSlugRequest:
      type: object
      required: [event_id, slug]
      properties:
        event_id: {$ref: '#/components/schemas/Uuid'}
        slug: {type: string}

    CallUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        event_id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        start: {type: integer}
        deadline: {type: integer}

    CallResponse:
      type: object
      required: [status, call]
      properties:
        status: {type: string, enum: [success]}
        call: {type: object, additionalProperties: true}

    CheckParticipantNameRequest:
      type: object
      required: [name]
      properties:
        call_id: {$ref: '#/components/schemas/Uuid'}
        program_id: {$ref: '#/components/schemas/Uuid'}
        participant_id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}

    GetCallProposalsRequest:
      type: object
      required: [call_id, type]
      properties:
        call_id: {$ref: '#/components/schemas/Uuid'}
        type:
          type: string
          enum: [artist, space]
        filters:
          type: object
          additionalProperties: true

    GetCallProposalsResponse:
      type: object
      required: [status, proposals]
      properties:
        status: {type: string, enum: [success]}
        proposals:
          type: array
          items: {type: object, additionalProperties: true}

    GetFormsRequest:
      type: object
      required: [call_id]
      properties:
        call_id: {$ref: '#/components/schemas/Uuid'}
        lang: {$ref: '#/components/schemas/Lang'}

    GetFormsResponse:
      type: object
      required: [status, forms]
      properties:
        status: {type: string, enum: [success]}
        forms: {type: object, additionalProperties: true}

    CallIdRequest:
      type: object
      required: [call_id]
      properties:
        call_id: {$ref: '#/components/schemas/Uuid'}

    GetCallFormsResponse:
      type: object
      required: [status, forms]
      properties:
        status: {type: string, enum: [success]}
        forms:
          type: array
          items: {$ref: '#/components/schemas/Form'}

    FormResponse:
      type: object
      required: [status, form]
      properties:
        status: {type: string, enum: [success]}
        form: {$ref: '#/components/schemas/Form'}

    ProgramUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        event_id: {$ref: '#/components/schemas/Uuid'}
        subcategories: {type: object, additionalProperties: true}
        texts: {type: object, additionalProperties: true}

    ProgramResponse:
      type: object
      required: [status]
      properties:
        status: {type: string, enum: [success]}
        program: {type: object, additionalProperties: true}
      additionalProperties: true

    ProductionResponse:
      type: object
      required: [status, production]
      properties:
        status: {type: string, enum: [success]}
        production: {$ref: '#/components/schemas/ProductionWithMeta'}

    SpaceResponse:
      type: object
      required: [status, space]
      properties:
        status: {type: string, enum: [success]}
        space: {$ref: '#/components/schemas/SpaceWithMeta'}

    FreeBlockResponse:
      type: object
      required: [status, free_block]
      properties:
        status: {type: string, enum: [success]}
        free_block: {$ref: '#/components/schemas/FreeBlockWithMeta'}

    SuggestRequest:
      type: object
      required: [query, event_id, lang]
      properties:
        query:
          type: array
          items: {type: string}
        event_id: {$ref: '#/components/schemas/Uuid'}
        lang: {$ref: '#/components/schemas/Lang'}

    ResultsRequest:
      type: object
      required: [query, shown, event_id, lang]
      properties:
        query:
          type: array
          items: {type: string}
        shown:
          type: array
          items: {$ref: '#/components/schemas/Uuid'}
        event_id: {$ref: '#/components/schemas/Uuid'}
        lang: {$ref: '#/components/schemas/Lang'}

    SuggestProgramRequest:
      type: object
      required: [query, event_id, filters, lang]
      properties:
        query:
          type: array
          items: {type: string}
        event_id: {$ref: '#/components/schemas/Uuid'}
        filters: {type: object, additionalProperties: true}
        lang: {$ref: '#/components/schemas/Lang'}

    ResultsProgramRequest:
      type: object
      required: [query, event_id, filters, date, time, lang]
      properties:
        query:
          type: array
          items: {type: string}
        event_id: {$ref: '#/components/schemas/Uuid'}
        filters: {type: object, additionalProperties: true}
        date: {type: string}
        time: {type: string}
        lang: {$ref: '#/components/schemas/Lang'}
        program_timestamp: {type: integer}

    SuggestTagsRequest:
      type: object
      required: [query, source]
      properties:
        query: {type: string}
        source: {type: string}

    SuggestEventNamesRequest:
      type: object
      required: [query]
      properties:
        query: {type: string}

    MetaListResponse:
      type: object
      required: [status, list]
      properties:
        status: {type: string, enum: [success]}
        list:
          type: array
          items: {type: object, additionalProperties: true}

    MetaSavedResponse:
      type: object
      required: [status, saved]
      properties:
        status: {type: string, enum: [success]}
        saved: {type: object, additionalProperties: true}

    MetaTagUpsert:
      type: object
      additionalProperties: false
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        text: {type: string}
        source: {type: string}
        holders:
          type: array
          items: {type: string}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    MetaAmbientUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        space_id: {$ref: '#/components/schemas/Uuid'}
        user_id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    MetaGalleryUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        user_id: {$ref: '#/components/schemas/Uuid'}

    MetaAdminUpsert:
      type: object
      additionalProperties: false
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        email: {type: string, format: email}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    MetaAssetUpsert:
      type: object
      additionalProperties: false
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        url: {type: string}
        holders:
          type: array
          items: {type: string}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    MetaParticipantUpsert:
      type: object
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        email: {type: string}
        profile_id: {$ref: '#/components/schemas/Uuid'}

    # --- Additions to make the spec self-contained (no dangling $ref) ---

    LinkItem:
      type: object
      additionalProperties: true
      properties:
        link: {type: string}
        web_title: {type: string}

    CacheField:
      description: Common cache object used by some elements.
      oneOf:
        - type: object
          required: [value, visible]
          additionalProperties: true
          properties:
            value: {}
            visible: {type: boolean}
            comment: {}
        - {}

    CreateProductionRequest:
      type: object
      required: [profile_id, format, category, title, description, short_description]
      additionalProperties: true
      properties:
        profile_id: {$ref: '#/components/schemas/Uuid'}
        id: {$ref: '#/components/schemas/Uuid'}
        format: {type: string}
        category: {type: string}
        title: {type: string}
        tags:
          description: Incoming tags as strings (server will map/create Tag ids and return tag texts).
          type: array
          items: {type: string}
          nullable: true
        description: {type: string}
        short_description: {type: string}
        duration: {type: string, nullable: true}
        photos:
          type: array
          items: {type: string}
          nullable: true
        main_picture:
          oneOf:
            - type: array
              items: {type: string}
            - type: string
          nullable: true
        links:
          type: array
          items: {$ref: '#/components/schemas/LinkItem'}
          nullable: true
        children: {}
        cache: {$ref: '#/components/schemas/CacheField'}

    ModifyProductionRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProductionRequest'
        - type: object
          required: [id]
          properties:
            id: {$ref: '#/components/schemas/Uuid'}

    ProductionWithMeta:
      type: object
      required: [id, profile_id, format, category, title, description, short_description]
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        user_id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        format: {type: string}
        category: {type: string}
        title: {type: string}
        tags:
          description: Response tag texts.
          type: array
          items: {type: string}
          nullable: true
        description: {type: string}
        short_description: {type: string}
        duration: {type: string, nullable: true}
        photos:
          type: array
          items: {type: string}
          nullable: true
        main_picture:
          type: array
          items: {type: string}
          nullable: true
        links:
          type: array
          items: {$ref: '#/components/schemas/LinkItem'}
          nullable: true
        children: {}
        cache: {$ref: '#/components/schemas/CacheField'}
        gallery:
          description: Gallery objects created/updated as side effects.
          type: array
          items: {type: object, additionalProperties: true}
          nullable: true

    CreateSpaceRequest:
      type: object
      required: [profile_id, name, address, description, type, ambients]
      additionalProperties: true
      properties:
        profile_id: {$ref: '#/components/schemas/Uuid'}
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        space_name:
          description: Alternative to `name` accepted by server.
          type: string
        type: {type: string}
        address: {}
        description: {}
        size: {}
        plane_picture:
          type: array
          items: {type: string}
          nullable: true
        main_picture:
          type: array
          items: {type: string}
          nullable: true
        human_resources: {}
        materials: {}
        accessibility: {}
        rules: {}
        single_ambient: {}
        ambients:
          description: Accepts array or hash-of-ambient; server normalizes hash values to array.
          oneOf:
            - type: array
              items: {$ref: '#/components/schemas/AmbientUpsert'}
            - type: object
              additionalProperties:
                $ref: '#/components/schemas/AmbientUpsert'

    ModifySpaceRequest:
      allOf:
        - $ref: '#/components/schemas/CreateSpaceRequest'
        - type: object
          required: [id]
          properties:
            id: {$ref: '#/components/schemas/Uuid'}

    AmbientUpsert:
      type: object
      required: [name, description, allowed_formats, allowed_categories]
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        description: {type: string}
        size: {}
        tech_specs: {}
        tech_poss: {}
        floor: {}
        height: {}
        capacity: {}
        allowed_categories:
          type: array
          items: {type: string}
        allowed_formats:
          type: array
          items: {type: string}
        links:
          type: array
          items: {$ref: '#/components/schemas/LinkItem'}
          nullable: true
        photos:
          type: array
          items: {type: string}
          nullable: true

    AmbientPublic:
      allOf:
        - $ref: '#/components/schemas/AmbientUpsert'
        - type: object
          description: Stored ambient has more fields; responses strip space_id/user_id/profile_id.

    SpaceWithMeta:
      type: object
      required: [id, profile_id, name, address, description, type, ambients]
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        user_id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        type: {type: string}
        address: {}
        description: {}
        size: {}
        plane_picture:
          type: array
          items: {type: string}
          nullable: true
        main_picture:
          type: array
          items: {type: string}
          nullable: true
        human_resources: {}
        materials: {}
        accessibility: {}
        rules: {}
        single_ambient: {}
        ambients:
          type: array
          items: {$ref: '#/components/schemas/AmbientPublic'}
        gallery:
          type: array
          items: {type: object, additionalProperties: true}
          nullable: true

    CreateFreeBlockRequest:
      type: object
      required: [name]
      additionalProperties: true
      properties:
        profile_id: {$ref: '#/components/schemas/Uuid'}
        id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        description: {type: string, nullable: true}
        links:
          type: array
          items: {$ref: '#/components/schemas/LinkItem'}
          nullable: true
        photos:
          type: array
          items: {type: string}
          nullable: true
        buttons:
          type: array
          items: {type: object, additionalProperties: true}
          nullable: true

    ModifyFreeBlockRequest:
      allOf:
        - $ref: '#/components/schemas/CreateFreeBlockRequest'
        - type: object
          required: [id]
          properties:
            id: {$ref: '#/components/schemas/Uuid'}

    FreeBlockWithMeta:
      type: object
      required: [id, name]
      additionalProperties: true
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        user_id: {$ref: '#/components/schemas/Uuid'}
        profile_id: {$ref: '#/components/schemas/Uuid'}
        name: {type: string}
        description: {type: string, nullable: true}
        links:
          type: array
          items: {$ref: '#/components/schemas/LinkItem'}
          nullable: true
        photos:
          type: array
          items: {type: string}
          nullable: true
        buttons:
          type: array
          items: {type: object, additionalProperties: true}
          nullable: true
        gallery:
          type: array
          items: {type: object, additionalProperties: true}
          nullable: true

    WhitelistEntry:
      type: object
      required: [name_email, email]
      additionalProperties: false
