  "/register":
    post:
      summary: Register a new user
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: Success or fail
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/success_envelope"
                - "$ref": "#/components/schemas/fail_envelope"
      requestBody:
        content:
          application/json:
            schema:
