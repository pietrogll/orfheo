openapi: 3.0.3

info:
  title: Orfheo API
  version: 0.1.0
  description: |
    JSON API specification derived from the Sinatra/Rack routes.

    Notes on behavior:
    - Many validation/permission failures raise `Pard::Invalid` and are normalized by middleware to HTTP 200 with a JSON body:
      `{ "status": "fail", "reason": "..." }`.
    - `Pard::Unexisting` returns HTTP 404.
    - Session auth is cookie-based (`rack.session`).
    - Several endpoints are implemented as POST even when they semantically mutate/delete.

servers:
  - url: http://localhost:3000
    description: Local
  - url: https://www.orfheo.org
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Profiles
  - name: Productions
  - name: Spaces
  - name: FreeBlocks
  - name: Events
  - name: Calls
  - name: Forms
  - name: Programs
  - name: Activities
  - name: Participants
  - name: Proposals
  - name: Search
  - name: Suggest
  - name: Meta
  - name: Contact

paths:
  /feedback:
    post:
      tags: [Contact]
      summary: Send feedback message
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ContactMessage'}
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/ContactMessage'}
      responses:
        '200': {$ref: '#/components/responses/SuccessEmptyOrFail'}

  /techSupport:
    post:
      tags: [Contact]
      summary: Send tech support message
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ContactMessage'}
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/ContactMessage'}
      responses:
        '200': {$ref: '#/components/responses/SuccessEmptyOrFail'}

  /business:
    post:
      tags: [Contact]
      summary: Send business inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/BusinessMessage'}
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/BusinessMessage'}
      responses:
        '200': {$ref: '#/components/responses/SuccessEmptyOrFail'}

  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterRequest'}
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/RegisterRequest'}
      responses:
        '200': {$ref: '#/components/responses/SuccessEmptyOrFail'}

  /login:
    post:
      tags: [Auth]
      summary: Log in (creates cookie session)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
          application/x-www-form-urlencoded:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200':
          description: Success or fail
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginSuccess'
                  - $ref: '#/components/schemas/FailEnvelope'

  /logout:
    post:
      tags: [Auth]
      summary: Log out (clears cookie session)
      security:
        - cookieAuth: []
      responses:
        '200': {$ref: '#/components/responses/SuccessEmptyOrFail'}

  /forgotten_password:
    post:
      tags: [Auth]
      summary: Request password reset email
